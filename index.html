<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Հրավիրատոմս</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;1,400&family=Noto+Sans+Armenian:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="skip-link" href="#main">Անցնել բովանդակությանը</a>

    <div id="music-dock" class="music-dock" hidden role="region" aria-label="Ֆոնային երաժշտություն">
        <button
            type="button"
            id="music-toggle"
            class="music-dock__btn"
            aria-pressed="false"
            aria-label="Միացնել երաժշտությունը"
        >
            <span class="music-dock__icon music-dock__icon--play" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <polygon points="7,5 7,19 19,12" fill="currentColor" />
                </svg>
            </span>
            <span class="music-dock__icon music-dock__icon--pause" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor" />
                    <rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor" />
                </svg>
            </span>
        </button>
        <p id="music-error" class="music-dock__error" hidden></p>
        <audio id="bg-audio" preload="auto" loop></audio>
    </div>

    <main id="main">
        <section id="hero" class="hero" aria-labelledby="hero-title">
            <div class="hero__cover">
                <img
                    id="hero-image"
                    class="hero__image"
                    src=""
                    alt=""
                    width="1200"
                    height="800"
                    fetchpriority="high"
                >
            </div>
        </section>

        <section class="section section--intro">
            <div class="section__inner section__inner--narrow">
                <h1 id="hero-title" class="intro__title">
                    <span id="couple-name-1" class="intro__name"></span>
                    <span class="intro__amp">և</span>
                    <span id="couple-name-2" class="intro__name"></span>
                </h1>
                <div class="divider-short"></div>
                <p id="hero-invitation" class="intro__text"></p>
                <img
                    id="hero-calendar-image"
                    class="intro__calendar"
                    src=""
                    alt=""
                    width="800"
                    height="600"
                    loading="lazy"
                    decoding="async"
                >
            </div>
        </section>

        <div class="divider-line"></div>

        <section class="section section--countdown">
            <div class="section__inner section__inner--narrow">
                <div class="countdown" aria-live="polite">
                    <p class="countdown__label">Հարսանիքին մնացել է</p>
                    <div class="countdown__grid" id="countdown-root">
                        <div class="countdown__unit">
                            <span class="countdown__value" id="cd-days">00</span>
                            <span class="countdown__unit-label">Օր</span>
                        </div>
                        <div class="countdown__unit">
                            <span class="countdown__value" id="cd-hours">00</span>
                            <span class="countdown__unit-label">Ժամ</span>
                        </div>
                        <div class="countdown__unit">
                            <span class="countdown__value" id="cd-minutes">00</span>
                            <span class="countdown__unit-label">Րոպե</span>
                        </div>
                        <div class="countdown__unit">
                            <span class="countdown__value" id="cd-seconds">00</span>
                            <span class="countdown__unit-label">Վայրկյան</span>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <div class="divider-line"></div>

        <section id="gallery" class="section section--gallery" aria-label="Լուսանկարներ">
            <div class="gallery-marquee" role="region" aria-label="Լուսանկարների շարք">
                    <div class="gallery-marquee__track">
                        <div class="gallery-marquee__group">
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-01.jpg" alt="Հարսանյաց լուսանկար 1" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-02.jpg" alt="Հարսանյաց լուսանկար 2" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-03.jpg" alt="Հարսանյաց լուսանկար 3" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-04.jpg" alt="Հարսանյաց լուսանկար 4" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-05.jpg" alt="Հարսանյաց լուսանկար 5" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-06.jpg" alt="Հարսանյաց լուսանկար 6" width="800" height="600" loading="lazy">
                            </figure>
                        </div>
                        <div class="gallery-marquee__group" aria-hidden="true">
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-01.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-02.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-03.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-04.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-05.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                            <figure class="gallery-item">
                                <img src="assets/images/gallery-06.jpg" alt="" width="800" height="600" loading="lazy">
                            </figure>
                        </div>
                    </div>
                </div>
        </section>

        <section id="schedule" class="section section--schedule" aria-labelledby="schedule-heading">
            <h2 id="schedule-heading" class="section__title">Ծրագիր</h2>
            <ol id="schedule-list" class="schedule-list"></ol>
        </section>

        <div class="divider-line"></div>

        <section id="locations" class="section section--locations" aria-labelledby="locations-heading">
            <div class="section__inner section__inner--narrow">
                <h2 id="locations-heading" class="section__title">Ինչպես հասնել</h2>
                <p class="section__lead">Քարտեզները կօգնեն արագ գտնել միջոցառման վայրերը։</p>
                <div id="venues-root" class="venues"></div>
            </div>
        </section>

        <section id="rsvp" class="section section--rsvp" aria-labelledby="rsvp-heading">
            <div class="section__inner section__inner--narrow">
                <h2 id="rsvp-heading" class="section__title">
                    Շնորհակալ կլինենք եթե նախապես հաստատեք Ձեր ներկայությունը։<br>
                    Կսպասենք Ձեր պատասխանին մինչև 20.05.2026
                </h2>
                <form id="rsvp-form" class="rsvp-form" novalidate>
                    <fieldset class="rsvp-form__side" aria-label="Հարսիկի կողմ կամ Փեսայի կողմ">
                        <div class="rsvp-form__side-options">
                            <label class="rsvp-form__radio-label">
                                <input
                                    type="radio"
                                    name="rsvp-side"
                                    id="rsvp-side-groom"
                                    class="rsvp-form__radio"
                                    value="groom"
                                    required
                                >
                                <span>Փեսայի կողմ</span>
                            </label>
                            <label class="rsvp-form__radio-label">
                                <input
                                    type="radio"
                                    name="rsvp-side"
                                    id="rsvp-side-bride"
                                    class="rsvp-form__radio"
                                    value="bride"
                                    required
                                >
                                <span>Հարսիկի կողմ</span>
                            </label>
                        </div>
                    </fieldset>
                    <div id="rsvp-guests" class="rsvp-form__guests">
                        <div class="rsvp-form__field">
                            <label for="rsvp-guest-0" class="rsvp-form__label">Անուն Ազգանուն</label>
                            <input
                                type="text"
                                id="rsvp-guest-0"
                                name="guest"
                                class="rsvp-form__input"
                                placeholder="Անուն Ազգանուն"
                                required
                                autocomplete="name"
                            >
                        </div>
                    </div>
                    <button type="button" id="rsvp-add-guest" class="rsvp-form__add-btn">
                        + Ավելացնել ևս մեկ հյուր
                    </button>
                    <button type="submit" id="rsvp-submit" class="btn btn--outline rsvp-form__submit">
                        Հաստատել
                    </button>
                    <p id="rsvp-status" class="rsvp-form__status" hidden></p>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
